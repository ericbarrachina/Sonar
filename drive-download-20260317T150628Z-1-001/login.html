<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonar - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <header>
        <img src="img/Sonar_1_-removebg-preview.png" alt="Sonar Logo">
        <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
            ☀️
        </button>
        <a href="index.html" class="login-button">Volver al Inicio</a>
    </header>

    <main>
        <div class="login-container">
            <h2>Iniciar Sesión</h2>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="********" required>
                </div>
                <button type="submit" class="cta-button">Iniciar Sesión</button>
            </form>
            <p class="register-link">¿No tienes cuenta? <a href="#">Regístrate</a></p>
        </div>
    </main>

    <script src="script.js"></script>

</body>
</html>
